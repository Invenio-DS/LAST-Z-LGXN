<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LEGION STORM LGXN MANAGER</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0f172a; margin: 0; padding: 15px; color: #e2e8f0; }
        .container { max-width: 1800px; margin: 0 auto; }
        h1 { font-size: 1.7rem; font-weight: bold; margin: 0 0 0.25rem 0; }
        .title-config {
            display: flex; flex-wrap: wrap; gap: 1rem; align-items: baseline;
            margin-bottom: 1rem; background: #1e293b; padding: 0.6rem 1rem; border-radius: 1rem;
        }
        .title-config label { font-weight: 600; }
        .title-config input { width: auto; min-width: 200px; }
        .card { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-bottom: 1.5rem; border: 1px solid #334155; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        button, .btn-like {
            background: #3b82f6; border: none; color: white; padding: 6px 14px;
            border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem;
        }
        button:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; }
        .btn-outline:hover { background: #3b82f620; }
        .btn-danger { background: #dc2626; }
        input, select, textarea { background: #0f172a; border: 1px solid #475569; padding: 6px 10px; border-radius: 12px; color: white; width: 100%; font-size: 0.8rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .table-wrapper { overflow-x: auto; border-radius: 1rem; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            table-layout: fixed;
        }
        /* Anchos personalizados (ahora con 26 columnas) */
        th:nth-child(1) { width: 3%; }   /* Checkbox */
        th:nth-child(2) { width: 9%; }   /* Name */
        th:nth-child(3) { width: 4%; }   /* Country */
        th:nth-child(4) { width: 2%; }   /* Level */
        th:nth-child(5) { width: 3%; }   /* Range */
        th:nth-child(6) { width: 4%; }   /* Total Power */
        th:nth-child(7) { width: 2%; }   /* Total Rank */
        th:nth-child(8) { width: 4%; }   /* F1 Total Power */
        th:nth-child(9) { width: 2%; }   /* F1 Rank */
        th:nth-child(10) { width: 5%; }  /* Heros Power */
        th:nth-child(11) { width: 2%; }  /* Heros Rank */
        th:nth-child(12) { width: 5%; }  /* Troops Power */
        th:nth-child(13) { width: 2%; }  /* Troops Rank */
        th:nth-child(14) { width: 5%; }  /* Tank Power */
        th:nth-child(15) { width: 2%; }  /* Tank Rank */
        th:nth-child(16) { width: 5%; }  /* Tech Power */
        th:nth-child(17) { width: 2%; }  /* Tech Rank */
        th:nth-child(18) { width: 6%; }  /* VS Week */
        th:nth-child(19) { width: 2%; }  /* VS Week Rank */
        th:nth-child(20) { width: 6%; }  /* VS 4 Weeks */
        th:nth-child(21) { width: 2%; }  /* VS 4W Rank */
        th:nth-child(22) { width: 4%; }  /* CoC */
        th:nth-child(23) { width: 3%; }  /* IQ */
        th:nth-child(24) { width: 4%; }  /* Go Next CC */
        th:nth-child(25) { width: 9%; }  /* Notes */
        th:nth-child(26) { width: 5%; }  /* Actions */

        th, td {
            border: 1px solid #334155;
            padding: 6px 4px;
            text-align: center;
            vertical-align: middle;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        th {
            background: #0f172a;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        tbody tr:nth-child(odd) { background-color: #2d3748; }
        tbody tr:nth-child(even) { background-color: #1e293b; }
        .coc-green { background-color: #15803d; color: white; font-weight: bold; }
        .coc-blue { background-color: #1e3a8a; color: white; }
        .coc-yellow { background-color: #a16207; color: white; }
        .coc-red { background-color: #991b1b; color: white; }
        .vs-met { background-color: #15803d; color: white; font-weight: bold; }
        .vs-close { background-color: #2563eb; color: white; }
        .vs-fail { background-color: #991b1b; color: white; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; margin-bottom: 20px;
        }
        .stat-card {
            background: #0f172a; border-radius: 1rem; padding: 10px 15px; border: 1px solid #334155;
        }
        .stat-card h3 { margin: 0 0 8px 0; font-size: 0.9rem; color: #94a3b8; }
        .stat-card p { margin: 4px 0; font-size: 0.75rem; }
        .stat-number { font-size: 1.1rem; font-weight: bold; color: #3b82f6; }
        .print-header, .print-date { display: none; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1e293b; border-radius: 1rem; width: 90%; max-width: 800px;
            max-height: 85vh; overflow: auto; padding: 1rem; border: 1px solid #3b82f6;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .close-modal { background: none; font-size: 1.5rem; cursor: pointer; border: none; color: white; }
        .filter-group {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;
            margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px;
        }
        .filter-item label { display: block; font-size: 0.7rem; margin-bottom: 4px; color: #94a3b8; font-weight: bold; }
        .filter-item .range { display: flex; gap: 8px; }
        .filter-item .range input { width: 50%; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .container { margin: 0; padding: 5px; max-width: none; }
            .title-config, .flex-row, .modal, #formCard, #ocrCard, footer, button, .btn-like, .btn-outline, .btn-danger, .filter-row {
                display: none !important;
            }
            .print-header, .print-date { display: block !important; text-align: center; margin-bottom: 8px; }
            .print-header { font-size: 14pt; font-weight: bold; }
            .print-date { font-size: 10pt; }
            .card { background: white; border: 1px solid #ccc; padding: 0; }
            table { font-size: 8pt; width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000; padding: 3px; }
            tbody tr:nth-child(odd) { background-color: #f2f2f2; }
            tbody tr:nth-child(even) { background-color: #ffffff; }
            .coc-green, .coc-blue, .coc-yellow, .coc-red, .vs-met, .vs-close, .vs-fail {
                background-color: #eee !important; color: black !important;
            }
        }

        /* ========== ESTILOS POR COLUMNA (tamaño, negrita, tipo de letra) ========== */
        td:nth-child(1), th:nth-child(1) { text-align: center; } /* Checkbox */
        td:nth-child(2), th:nth-child(2) { font-size: 0.8rem; font-weight: bold; } /* Name */
        td:nth-child(3), th:nth-child(3) { font-size: 0.7rem; } /* Country */
        td:nth-child(4), th:nth-child(4) { font-size: 0.7rem; } /* Level */
        td:nth-child(5), th:nth-child(5) { font-size: 0.7rem; } /* Range */
        td:nth-child(6), th:nth-child(6) { font-size: 0.7rem; font-family: monospace; } /* Total Power */
        td:nth-child(7), th:nth-child(7) { font-size: 0.65rem; } /* Total Rank */
        td:nth-child(8), th:nth-child(8) { font-size: 0.7rem; font-family: monospace; } /* F1 Total Power */
        td:nth-child(9), th:nth-child(9) { font-size: 0.65rem; } /* F1 Rank */
        td:nth-child(10), th:nth-child(10) { font-size: 0.7rem; font-family: monospace; } /* Heros Power */
        td:nth-child(11), th:nth-child(11) { font-size: 0.65rem; } /* Heros Rank */
        td:nth-child(12), th:nth-child(12) { font-size: 0.7rem; font-family: monospace; } /* Troops Power */
        td:nth-child(13), th:nth-child(13) { font-size: 0.65rem; } /* Troops Rank */
        td:nth-child(14), th:nth-child(14) { font-size: 0.7rem; font-family: monospace; } /* Tank Power */
        td:nth-child(15), th:nth-child(15) { font-size: 0.65rem; } /* Tank Rank */
        td:nth-child(16), th:nth-child(16) { font-size: 0.7rem; font-family: monospace; } /* Tech Power */
        td:nth-child(17), th:nth-child(17) { font-size: 0.65rem; } /* Tech Rank */
        td:nth-child(18), th:nth-child(18) { font-size: 0.7rem; font-family: monospace; } /* VS Week */
        td:nth-child(19), th:nth-child(19) { font-size: 0.65rem; } /* VS Week Rank */
        td:nth-child(20), th:nth-child(20) { font-size: 0.7rem; font-family: monospace; } /* VS 4 Weeks */
        td:nth-child(21), th:nth-child(21) { font-size: 0.65rem; } /* VS 4W Rank */
        td:nth-child(22), th:nth-child(22) { font-size: 0.75rem; font-weight: bold; } /* CoC */
        td:nth-child(23), th:nth-child(23) { font-size: 0.7rem; } /* IQ */
        td:nth-child(24), th:nth-child(24) { font-size: 0.7rem; } /* Go Next CC */
        td:nth-child(25), th:nth-child(25) { font-size: 0.7rem; } /* Notes */
        td:nth-child(26), th:nth-child(26) { font-size: 0.7rem; } /* Actions */
    </style>
</head>
<body>
<div class="container">
    <div class="print-header"></div>
    <div class="print-date"></div>
    <div class="title-config">
        <div><label>Report Title: </label><input type="text" id="reportTitle" value="STATICS LEGION STORM - LGXN"></div>

</div>

<!-- OCR Modal (flotante, con OCR.space) -->
<div id="ocrModal" class="modal">

        <div class="flex-row" style="margin-top: 15px; justify-content: flex-end;">
            <button id="applyOcrAllWeekBtn">Apply All to VS Week</button>
            <button id="applyOcrAll4WeekBtn">Apply All to VS 4 Weeks</button>
            <button id="closeOcrBtn" class="btn-outline">Close</button>
        </div>
    </div>

<script>
    // ==================== GOOGLE SHEETS CONFIG ====================
    const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbznCNYNQV4Hj8eLxQ1A6T4u-jfjwu9bfLSNVr1goPaTb7rIavZpbq-eYwy_cc_nsA57ow/exec';
    // =============================================================

    const COUNTRIES = [
        "USA", "IND", "UK", "BRA", "ARG", "CAN", "PAK", "MEX", "FRA", "ITA", "VEN", "HON", "TUR", "FIN", "ECU",
        "AUS", "POL", "NZL", "ICE", "GER", "TRI", "JAM", "PHI", "JOR", "PER", "COL", "TAI", "CHI", "JAP", "KOR",
        "ESP", "NED", "BEL", "SUI", "SWE", "NOR", "DEN", "RUS", "CHN", "SAU", "UAE", "ISR", "EGY", "MAR", "NOC"
    ];
    
    const COLUMNS = [
        { key: "name", label: "Name", type: "text" },
        { key: "country", label: "Country", type: "select", options: COUNTRIES },
        { key: "level", label: "Level", type: "number" },
        { key: "range", label: "Range", type: "select", options: ["R5","R4","R3","R2","R1"] },
        { key: "totalPower", label: "Total Power (M)", type: "number" },
        { key: "totalPowerRank", label: "Total Rank", type: "number" },
        { key: "f1Arena", label: "F1 Total Power (M)", type: "number" },
        { key: "f1ArenaRank", label: "F1 Rank", type: "number" },
        { key: "heroPower", label: "Heros Power", type: "number" },
        { key: "heroPowerRank", label: "Heros Rank", type: "number" },
        { key: "troopsPower", label: "Troops Power", type: "number" },
        { key: "troopsPowerRank", label: "Troops Rank", type: "number" },
        { key: "tankPower", label: "Tank Power", type: "number" },
        { key: "tankPowerRank", label: "Tank Rank", type: "number" },
        { key: "techPower", label: "Tech Power", type: "number" },
        { key: "techPowerRank", label: "Tech Rank", type: "number" },
        { key: "vsWeek", label: "VS Week", type: "number" },
        { key: "vsWeekRank", label: "VS Week Rank", type: "number" },
        { key: "vs4Week", label: "VS 4 Weeks", type: "number" },
        { key: "vs4WeekRank", label: "VS 4W Rank", type: "number" },
        { key: "coc", label: "CoC", type: "number" },
        { key: "iq", label: "IQ", type: "number" },
        { key: "selectedForCC", label: "Go Next CC", type: "select", options: ["YES","NO"] },
        { key: "notes", label: "Notes", type: "text" }
    ];

    let players = [];
    let filters = {};
    let filteredPlayers = [];
    let vsWeekMin = 12000000;
    let vs4WeekMin = 48000000;
    let editingIndex = -1;

    // ---------- Google Sheets ----------
    async function loadPlayersFromSheet() {
        try {
            console.log("Loading from Google Sheets...");
            const response = await fetch(`${SHEET_API_URL}?action=load`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            console.log("Data loaded:", data);
            return Array.isArray(data) ? data : [];
        } catch (error) {
            console.error('Error loading from Google Sheets:', error);
            alert("Error loading data from Google Sheets. Check console and URL.");
            return [];
        }
    }
    async function savePlayersToSheet(playersToSave) {
        try {
            await fetch(SHEET_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ action: 'save', data: JSON.stringify(playersToSave) })
            });
            console.log("Saved to Google Sheets");
        } catch (error) {
            console.error('Error saving to Google Sheets:', error);
        }
    }

    function formatNumber(num, decimals = 0) {
        if (num === undefined || num === null) return "";
        if (typeof num !== "number") return num;
        return num.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function calculateCocAndIq(p) {
        const totalPowerRaw = p.totalPower * 1_000_000;
        const f1Raw = p.f1Arena * 1_000_000;
        const denominator = totalPowerRaw + f1Raw + (p.heroPower || 0) + (p.troopsPower || 0) + (p.tankPower || 0) + (p.techPower || 0);
        let coc = denominator > 0 ? ((p.vsWeek + p.vs4Week) / denominator) * 100 : 0;
        coc = Math.round(coc * 100) / 100;
        let iq = p.level > 0 ? coc / p.level : 0;
        iq = Math.round(iq * 100) / 100;
        return { coc, iq };
    }

    function evaluateVsStatus(playerPoints, minPoints) {
        if (playerPoints >= minPoints) return 'met';
        const diff = minPoints - playerPoints;
        if (diff < 3100000) return 'close';
        return 'fail';
    }

    async function updateAllRankings() {
        const rankFields = ["totalPower", "f1Arena", "heroPower", "troopsPower", "tankPower", "techPower", "vsWeek", "vs4Week"];
        for (let field of rankFields) {
            const sorted = [...players].sort((a,b) => (b[field] || 0) - (a[field] || 0));
            const rankMap = new Map();
            sorted.forEach((p, idx) => rankMap.set(p, idx+1));
            players.forEach(p => p[`${field}Rank`] = rankMap.get(p) || players.length);
        }
        for (let p of players) {
            const {coc, iq} = calculateCocAndIq(p);
            p.coc = coc;
            p.iq = iq;
        }
        applyFilters();
        renderCanyonModal();
        updateStats();
        await savePlayersToSheet(players);
    }

    function applyFilters() {
        filteredPlayers = players.filter(p => {
            for (let col of COLUMNS) {
                const key = col.key;
                const filter = filters[key];
                if (!filter) continue;
                let value = p[key];
                if (value === undefined || value === null) value = "";
                if (col.type === "number") {
                    if (filter.min !== undefined && filter.min !== "" && value < parseFloat(filter.min)) return false;
                    if (filter.max !== undefined && filter.max !== "" && value > parseFloat(filter.max)) return false;
                }
                else if (col.type === "text") {
                    if (filter.text && filter.text.trim() !== "") {
                        if (!String(value).toLowerCase().includes(filter.text.toLowerCase())) return false;
                    }
                }
                else if (col.type === "select") {
                    if (filter.selected && filter.selected !== "" && filter.selected !== "All") {
                        if (String(value) !== filter.selected) return false;
                    }
                }
            }
            return true;
        });
        renderPlayersTable();
    }

    function updateStats() {
        const totalPlayers = players.length;
        if (totalPlayers === 0) {
            document.getElementById("statsContainer").innerHTML = '<div class="stat-card">No players loaded. Please load Excel or add players manually.</div>';
            return;
        }
        const sumTotalPower = players.reduce((s,p) => s + p.totalPower, 0);
        const avgTotalPower = sumTotalPower / totalPlayers;
        const sumVsWeek = players.reduce((s,p) => s + p.vsWeek, 0);
        const avgVsWeek = sumVsWeek / totalPlayers;
        const sumVs4Week = players.reduce((s,p) => s + p.vs4Week, 0);
        const avgVs4Week = sumVs4Week / totalPlayers;
        
        const powerRanges = { "300M+":0, "260-300M":0, "230-260M":0, "200-230M":0, "170-200M":0, "<170M":0 };
        players.forEach(p => {
            const power = p.totalPower;
            if (power >= 300) powerRanges["300M+"]++;
            else if (power >= 260) powerRanges["260-300M"]++;
            else if (power >= 230) powerRanges["230-260M"]++;
            else if (power >= 200) powerRanges["200-230M"]++;
            else if (power >= 170) powerRanges["170-200M"]++;
            else powerRanges["<170M"]++;
        });
        
        const f1Ranges = { ">=200M":0, "160-199.99M":0, "130-159.99M":0, "100-129.99M":0, "70-99.99M":0, "<70M":0 };
        players.forEach(p => {
            const f1 = p.f1Arena;
            if (f1 >= 200) f1Ranges[">=200M"]++;
            else if (f1 >= 160) f1Ranges["160-199.99M"]++;
            else if (f1 >= 130) f1Ranges["130-159.99M"]++;
            else if (f1 >= 100) f1Ranges["100-129.99M"]++;
            else if (f1 >= 70) f1Ranges["70-99.99M"]++;
            else f1Ranges["<70M"]++;
        });
        
        const levelCount = {};
        const rangeCount = {};
        players.forEach(p => { levelCount[p.level] = (levelCount[p.level] || 0) + 1; });
        players.forEach(p => { rangeCount[p.range] = (rangeCount[p.range] || 0) + 1; });
        const totalRanges = Object.values(rangeCount).reduce((a,b) => a + b, 0);
        
        const countryCount = {};
        players.forEach(p => { countryCount[p.country] = (countryCount[p.country] || 0) + 1; });
        const countryPercent = Object.entries(countryCount).map(([c, cnt]) => `${c}: ${cnt} (${(cnt/totalPlayers*100).toFixed(1)}%)`).join(', ');
        
        let vsWeekMet=0, vsWeekClose=0, vsWeekFail=0;
        let vs4WeekMet=0, vs4WeekClose=0, vs4WeekFail=0;
        players.forEach(p => {
            const sWeek = evaluateVsStatus(p.vsWeek, vsWeekMin);
            if (sWeek === 'met') vsWeekMet++;
            else if (sWeek === 'close') vsWeekClose++;
            else vsWeekFail++;
            const s4Week = evaluateVsStatus(p.vs4Week, vs4WeekMin);
            if (s4Week === 'met') vs4WeekMet++;
            else if (s4Week === 'close') vs4WeekClose++;
            else vs4WeekFail++;
        });
        
        const statsHtml = `
            <div class="stat-card"><h3>📊 Averages</h3>
                <p>💪 Total Power: <span class="stat-number">${formatNumber(avgTotalPower,1)} M</span></p>
                <p>⚔️ VS Week: <span class="stat-number">${formatNumber(avgVsWeek,0)}</span></p>
                <p>📅 VS 4 Weeks: <span class="stat-number">${formatNumber(avgVs4Week,0)}</span></p>
            </div>
            <div class="stat-card"><h3>📈 Total Power Distribution</h3>
                ${Object.entries(powerRanges).map(([label, count]) => `<p>${label}: ${count} (${(count/totalPlayers*100).toFixed(1)}%)</p>`).join('')}
            </div>
            <div class="stat-card"><h3>🏆 F1 Total Power Distribution</h3>
                ${Object.entries(f1Ranges).map(([label, count]) => `<p>${label}: ${count} (${(count/totalPlayers*100).toFixed(1)}%)</p>`).join('')}
            </div>
            <div class="stat-card"><h3>🎚️ Level Distribution</h3>
                ${Object.entries(levelCount).sort((a,b)=>a[0]-b[0]).map(([lvl, cnt]) => `<p>Level ${lvl}: ${cnt} (${(cnt/totalPlayers*100).toFixed(1)}%)</p>`).join('')}
            </div>
            <div class="stat-card"><h3>🏅 Range Distribution</h3>
                ${Object.entries(rangeCount).map(([rng, cnt]) => `<p>${rng}: ${cnt} (${(cnt/totalPlayers*100).toFixed(1)}%)</p>`).join('')}
                <p><strong>Total: ${totalRanges}</strong></p>
            </div>
            <div class="stat-card"><h3>🎯 VS Week Performance (min ${formatNumber(vsWeekMin,0)})</h3>
                <p>✅ Met: ${vsWeekMet} (${(vsWeekMet/totalPlayers*100).toFixed(1)}%)</p>
                <p>🔵 Close (<3.1M below): ${vsWeekClose} (${(vsWeekClose/totalPlayers*100).toFixed(1)}%)</p>
                <p>🔴 Fail (≥3.1M below): ${vsWeekFail} (${(vsWeekFail/totalPlayers*100).toFixed(1)}%)</p>
            </div>
            <div class="stat-card"><h3>🎯 VS 4 Weeks Performance (min ${formatNumber(vs4WeekMin,0)})</h3>
                <p>✅ Met: ${vs4WeekMet} (${(vs4WeekMet/totalPlayers*100).toFixed(1)}%)</p>
                <p>🔵 Close (<3.1M below): ${vs4WeekClose} (${(vs4WeekClose/totalPlayers*100).toFixed(1)}%)</p>
                <p>🔴 Fail (≥3.1M below): ${vs4WeekFail} (${(vs4WeekFail/totalPlayers*100).toFixed(1)}%)</p>
            </div>
            <div class="stat-card"><h3>🌍 Countries</h3>
                <p style="font-size:0.7rem;">${countryPercent}</p>
            </div>
        `;
        document.getElementById("statsContainer").innerHTML = statsHtml;
    }

    // ---------- Función para verificar nombre duplicado ----------
    function isDuplicateName(name, excludeIndex = -1) {
        const normalized = name.trim().toUpperCase();
        return players.some((p, idx) => idx !== excludeIndex && p.name.trim().toUpperCase() === normalized);
    }

    function renderPlayersTable() {
        const thead = document.getElementById("tableHeader");
        const tbody = document.getElementById("tableBody");
        if (!thead) return;
        thead.innerHTML = "";
        tbody.innerHTML = "";
        const headerRow = document.createElement("tr");
        // Checkbox en el encabezado
        const thCheck = document.createElement("th");
        const headerCheckbox = document.createElement("input");
        headerCheckbox.type = "checkbox";
        headerCheckbox.id = "selectAllCheckbox";
        headerCheckbox.addEventListener("change", (e) => {
            const isChecked = e.target.checked;
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = isChecked);
        });
        thCheck.appendChild(headerCheckbox);
        headerRow.appendChild(thCheck);
        // Resto de columnas
        COLUMNS.forEach(col => {
            const th = document.createElement("th");
            th.textContent = col.label;
            th.style.cursor = "pointer";
            th.onclick = () => sortBy(col.key);
            headerRow.appendChild(th);
        });
        const thActions = document.createElement("th");
        thActions.textContent = "Actions";
        headerRow.appendChild(thActions);
        thead.appendChild(headerRow);

        filteredPlayers.forEach((p, idx) => {
            const row = document.createElement("tr");
            // Checkbox en cada fila
            const tdCheck = document.createElement("td");
            const chk = document.createElement("input");
            chk.type = "checkbox";
            chk.className = "row-checkbox";
            tdCheck.appendChild(chk);
            row.appendChild(tdCheck);
            // Datos de columnas
            COLUMNS.forEach(col => {
                const td = document.createElement("td");
                if (col.key === "selectedForCC") {
                    const select = document.createElement("select");
                    select.innerHTML = `<option value="YES">YES</option><option value="NO">NO</option>`;
                    select.value = p.selectedForCC || "NO";
                    select.addEventListener("change", (e) => { p.selectedForCC = e.target.value; updateAllRankings(); });
                    td.appendChild(select);
                } else if (col.key === "notes") {
                    const select = document.createElement("select");
                    select.innerHTML = `<option value="">None</option><option value="PROMOTE TO R2">PROMOTE TO R2</option><option value="PROMOTE TO R3">PROMOTE TO R3</option><option value="DEGRADE TO R2">DEGRADE TO R2</option><option value="DEGRADE TO R1">DEGRADE TO R1</option><option value="SEND TO ACADEMY">SEND TO ACADEMY</option><option value="SEND TO FARM">SEND TO FARM</option><option value="NEW PLAYER">NEW PLAYER</option><option value="ACTIVE">ACTIVE</option>`;
                    select.value = p.notes || "";
                    select.addEventListener("change", (e) => { p.notes = e.target.value; updateAllRankings(); });
                    td.appendChild(select);
                } else if (col.type === "select" && col.key !== "selectedForCC" && col.key !== "notes") {
                    const select = document.createElement("select");
                    col.options.forEach(opt => {
                        const option = document.createElement("option");
                        option.value = opt;
                        option.textContent = opt;
                        select.appendChild(option);
                    });
                    select.value = p[col.key] || "";
                    select.addEventListener("change", (e) => { p[col.key] = e.target.value; updateAllRankings(); });
                    td.appendChild(select);
                } else {
                    let val = p[col.key];
                    if (val === undefined) val = "";
                    if (typeof val === "number") {
                        if (col.key === "coc" || col.key === "iq") val = formatNumber(val, 2);
                        else if (col.key === "totalPower" || col.key === "f1Arena") val = formatNumber(val, 1);
                        else val = formatNumber(val, 0);
                    }
                    td.textContent = val;
                    if (col.key === "coc") td.className = getCocColorClass(p.coc);
                    if (col.key === "vsWeek") td.classList.add(evaluateVsStatus(p.vsWeek, vsWeekMin) === 'met' ? 'vs-met' : (evaluateVsStatus(p.vsWeek, vsWeekMin) === 'close' ? 'vs-close' : 'vs-fail'));
                    if (col.key === "vs4Week") td.classList.add(evaluateVsStatus(p.vs4Week, vs4WeekMin) === 'met' ? 'vs-met' : (evaluateVsStatus(p.vs4Week, vs4WeekMin) === 'close' ? 'vs-close' : 'vs-fail'));
                }
                row.appendChild(td);
            });
            const originalIdx = players.findIndex(orig => orig.name === p.name && orig.country === p.country);
            const tdActions = document.createElement("td");
            tdActions.innerHTML = `<button class="editPlayerBtn" data-idx="${originalIdx}" style="background:#3b82f6; padding:2px 6px;">Edit</button> <button class="deletePlayerBtn" data-idx="${originalIdx}" style="background:#b91c1c; padding:2px 6px;">Del</button>`;
            row.appendChild(tdActions);
            tbody.appendChild(row);
        });
        attachEditDeleteEvents();
    }

    function getCocColorClass(coc) {
        if (coc >= 100) return "coc-green";
        if (coc >= 80) return "coc-blue";
        if (coc >= 60) return "coc-yellow";
        return "coc-red";
    }

    let currentSort = { key: "name", asc: true };
    function sortBy(key) {
        if (currentSort.key === key) currentSort.asc = !currentSort.asc;
        else { currentSort.key = key; currentSort.asc = true; }
        filteredPlayers.sort((a, b) => {
            let av = a[key], bv = b[key];
            if (typeof av === 'string') av = av.toLowerCase();
            if (typeof bv === 'string') bv = bv.toLowerCase();
            if (av === undefined) av = '';
            if (bv === undefined) bv = '';
            if (av < bv) return currentSort.asc ? -1 : 1;
            if (av > bv) return currentSort.asc ? 1 : -1;
            return 0;
        });
        renderPlayersTable();
    }

    function attachEditDeleteEvents() {
        document.querySelectorAll('.editPlayerBtn').forEach(btn => {
            btn.addEventListener('click', () => openFormForEdit(parseInt(btn.dataset.idx)));
        });
        document.querySelectorAll('.deletePlayerBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                if(confirm("Delete player?")) {
                    players.splice(parseInt(btn.dataset.idx),1);
                    updateAllRankings();
                }
            });
        });
    }

    function loadExcelData(arrayBuffer) {
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        if(!rows || rows.length < 3) return;
        const newPlayers = [];
        for(let i=2; i<rows.length; i++) {
            const row = rows[i];
            if(!row || row.length < 3) continue;
            const player = {};
            COLUMNS.forEach((col, idx) => {
                let val = row[idx+1]; // saltar columna de checkbox
                if(val === undefined) val = "";
                if(["totalPower","f1Arena","heroPower","troopsPower","tankPower","techPower","vsWeek","vs4Week","level"].includes(col.key)) {
                    val = parseFloat(val) || 0;
                }
                player[col.key] = val;
            });
            if(player.name && player.name.toString().trim() !== "") {
                player.team = player.team || "";
                player.zone = player.zone || "A";
                player.selectedForCC = player.selectedForCC || "NO";
                player.notes = player.notes || "";
                player.availability = player.availability || "Available";
                newPlayers.push(player);
            }
        }
        if(newPlayers.length) players = newPlayers;
        updateAllRankings();
        alert(`Loaded ${players.length} players from Excel.`);
    }

    document.getElementById("ocrImageInput")?.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const apiKey = document.getElementById('ocrApiKey').value.trim();
        if (!apiKey) {
            alert("Please enter your OCR.space API key (get free at ocr.space/ocrapi)");
            return;
        }
        const statusDiv = document.getElementById("ocrStatus");
        const previewDiv = document.getElementById("ocrPreview");
        const extractedDiv = document.getElementById("ocrExtractedData");
        statusDiv.innerText = "Uploading image to OCR.space...";
        previewDiv.innerHTML = "";
        extractedDiv.innerHTML = "";
        
        const formData = new FormData();
        formData.append('apikey', apiKey);
        formData.append('file', file);
        formData.append('language', 'eng');
        formData.append('OCREngine', '2');
        
        try {
            const response = await fetch('https://api.ocr.space/parse/image', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (!result.IsErroredOnProcessing) {
                const parsedText = result.ParsedResults[0].ParsedText;
                previewDiv.innerHTML = `<strong>OCR Output:</strong><br>${parsedText.replace(/\n/g,'<br>')}`;
                statusDiv.innerText = "Extracting names and points...";
                
                // Limpiar líneas: eliminar las que contengan "[LGXN]" o "STORM LEGION"
                const lines = parsedText.split(/\r?\n/);
                const cleanLines = [];
                for (let line of lines) {
                    if (!line.includes("[LGXN]") && !line.includes("STORM LEGION")) {
                        cleanLines.push(line.trim());
                    }
                }
                
                const playersFound = [];
                let currentName = "";
                for (let i = 0; i < cleanLines.length; i++) {
                    let line = cleanLines[i];
                    if (!line) continue;
                    // Buscar número con comas (puntos)
                    let pointsMatch = line.match(/(\d{1,3}(?:,\d{3})+)/);
                    if (pointsMatch) {
                        let points = parseInt(pointsMatch[1].replace(/,/g, ''));
                        if (!isNaN(points) && points > 1000000) {
                            // Si tenemos un nombre almacenado de la línea anterior, asociar
                            if (currentName) {
                                playersFound.push({ name: currentName, points: points });
                                currentName = "";
                            } else {
                                // Intentar extraer nombre de la misma línea antes del número
                                let possibleName = line.substring(0, line.indexOf(pointsMatch[1])).trim();
                                if (possibleName.length > 2 && !possibleName.match(/[\d,]/)) {
                                    playersFound.push({ name: possibleName, points: points });
                                } else if (i > 0 && cleanLines[i-1].length > 2 && !cleanLines[i-1].match(/[\d,]/)) {
                                    // Usar línea anterior como nombre
                                    playersFound.push({ name: cleanLines[i-1], points: points });
                                }
                            }
                        }
                    } else if (line.length > 2 && !line.match(/[\d,]/) && !line.toLowerCase().includes('point') && !line.toLowerCase().includes('ranking')) {
                        // Posible nombre
                        currentName = line;
                    }
                }
                // Eliminar duplicados por nombre (case-insensitive)
                const unique = new Map();
                for (let p of playersFound) {
                    const key = p.name.toUpperCase();
                    if (!unique.has(key)) unique.set(key, p);
                }
                lastOcrPlayers = Array.from(unique.values());
                if (lastOcrPlayers.length === 0) {
                    extractedDiv.innerHTML = "<strong>No players found. Check image format or try another image.</strong>";
                } else {
                    let html = "<strong>Detected players:</strong><table style='width:100%; margin-top:8px;'><tr><th>Name</th><th>Points</th></tr>";
                    for (let p of lastOcrPlayers) {
                        html += `<tr><td>${p.name}</td><td>${p.points.toLocaleString()}</td></tr>`;
                    }
                    html += "</table>";
                    extractedDiv.innerHTML = html;
                }
                statusDiv.innerText = `Found ${lastOcrPlayers.length} players. Use buttons below to apply.`;
            } else {
                statusDiv.innerText = "OCR error: " + (result.ErrorMessage || "Unknown error");
            }
        } catch (err) {
            statusDiv.innerText = "Request failed: " + err.message;
        }
    });

    async function applyOcrToField(field) {
        if (lastOcrPlayers.length === 0) {
            alert("No OCR data. Please run OCR first.");
            return;
        }
        let updatedCount = 0;
        for (let ocr of lastOcrPlayers) {
            const normalizedName = ocr.name.trim().toUpperCase().replace(/Rortu/i, 'PORTU');
            const existingIndex = players.findIndex(p => p.name.trim().toUpperCase() === normalizedName);
            if (existingIndex !== -1) {
                if (field === 'vsWeek') {
                    players[existingIndex].vsWeek = ocr.points;
                } else {
                    players[existingIndex].vs4Week = ocr.points;
                }
                updatedCount++;
            } else {
                console.log(`Player not found: ${ocr.name}`);
            }
        }
        if (updatedCount > 0) {
            await updateAllRankings();
            alert(`Updated ${updatedCount} players (${field === 'vsWeek' ? 'VS Week' : 'VS 4 Weeks'})`);
            document.getElementById("ocrModal").style.display = "none";
        } else {
            alert("No matching players found. Check names in image.");
        }
    }
    document.getElementById("applyOcrAllWeekBtn")?.addEventListener("click", () => applyOcrToField('vsWeek'));
    document.getElementById("applyOcrAll4WeekBtn")?.addEventListener("click", () => applyOcrToField('vs4Week'));

    // ---------- Filter Modal Functions ----------
    function buildFilterModal() {
        const container = document.getElementById("filterModalBody");
        container.innerHTML = "";
        const numericCols = COLUMNS.filter(c => c.type === "number");
        const textCols = COLUMNS.filter(c => c.type === "text");
        const selectCols = COLUMNS.filter(c => c.type === "select");

        if (numericCols.length) {
            const groupDiv = document.createElement("div");
            groupDiv.className = "filter-group";
            groupDiv.innerHTML = "<h3>Numeric Ranges</h3>";
            numericCols.forEach(col => {
                const div = document.createElement("div");
                div.className = "filter-item";
                div.innerHTML = `<label>${col.label}</label><div class="range"><input type="number" placeholder="Min" id="filter_min_${col.key}" value="${filters[col.key]?.min || ''}"><input type="number" placeholder="Max" id="filter_max_${col.key}" value="${filters[col.key]?.max || ''}"></div>`;
                groupDiv.appendChild(div);
            });
            container.appendChild(groupDiv);
        }

        if (textCols.length) {
            const groupDiv = document.createElement("div");
            groupDiv.className = "filter-group";
            groupDiv.innerHTML = "<h3>Text Contains</h3>";
            textCols.forEach(col => {
                const div = document.createElement("div");
                div.className = "filter-item";
                div.innerHTML = `<label>${col.label}</label><input type="text" id="filter_text_${col.key}" placeholder="Contains..." value="${filters[col.key]?.text || ''}">`;
                groupDiv.appendChild(div);
            });
            container.appendChild(groupDiv);
        }

        if (selectCols.length) {
            const groupDiv = document.createElement("div");
            groupDiv.className = "filter-group";
            groupDiv.innerHTML = "<h3>Select Options</h3>";
            selectCols.forEach(col => {
                const div = document.createElement("div");
                div.className = "filter-item";
                let optionsHtml = '<option value="">All</option>';
                col.options.forEach(opt => {
                    optionsHtml += `<option value="${opt}">${opt}</option>`;
                });
                div.innerHTML = `<label>${col.label}</label><select id="filter_select_${col.key}">${optionsHtml}</select>`;
                const selectEl = div.querySelector("select");
                if (filters[col.key]?.selected) selectEl.value = filters[col.key].selected;
                groupDiv.appendChild(div);
            });
            container.appendChild(groupDiv);
        }
    }

    function collectFiltersFromModal() {
        const newFilters = {};
        COLUMNS.forEach(col => {
            if (col.type === "number") {
                const minVal = document.getElementById(`filter_min_${col.key}`)?.value;
                const maxVal = document.getElementById(`filter_max_${col.key}`)?.value;
                if (minVal || maxVal) newFilters[col.key] = { min: minVal, max: maxVal };
            } else if (col.type === "text") {
                const textVal = document.getElementById(`filter_text_${col.key}`)?.value;
                if (textVal && textVal.trim() !== "") newFilters[col.key] = { text: textVal };
            } else if (col.type === "select") {
                const selected = document.getElementById(`filter_select_${col.key}`)?.value;
                if (selected && selected !== "") newFilters[col.key] = { selected: selected };
            }
        });
        return newFilters;
    }

    function resetFilters() {
        filters = {};
        applyFilters();
        buildFilterModal();
    }

    document.getElementById("openFilterModalBtn")?.addEventListener("click", () => {
        buildFilterModal();
        document.getElementById("filterModal").style.display = "flex";
    });
    document.getElementById("closeFilterModalBtn")?.addEventListener("click", () => {
        document.getElementById("filterModal").style.display = "none";
    });
    document.getElementById("applyFiltersBtn")?.addEventListener("click", () => {
        filters = collectFiltersFromModal();
        applyFilters();
        document.getElementById("filterModal").style.display = "none";
    });
    document.getElementById("resetFiltersBtn")?.addEventListener("click", () => {
        resetFilters();
        buildFilterModal();
    });
    document.getElementById("clearFiltersBtn")?.addEventListener("click", () => {
        resetFilters();
    });

    // ---------- Canyon Clash Functions ----------
    function renderCanyonModal() {
        const tbody = document.getElementById("canyonModalBody");
        if (!tbody) return;
        tbody.innerHTML = "";
        players.forEach((p, idx) => {
            const row = document.createElement("tr");
            const clashPoints = p.vsWeek + p.vs4Week;
            const zoneOptions = `<option value="None" ${p.zone === "None" ? "selected" : ""}>None</option><option value="A" ${p.zone === "A" ? "selected" : ""}>A</option><option value="B" ${p.zone === "B" ? "selected" : ""}>B</option><option value="C" ${p.zone === "C" ? "selected" : ""}>C</option><option value="D" ${p.zone === "D" ? "selected" : ""}>D</option>`;
            row.innerHTML = `
                <td>${p.name || ""}</td>
                <td>${p.range || ""}</td>
                <td>${formatNumber(p.f1Arena, 1)}</td>
                <td><select class="canyon-team" data-idx="${idx}"><option value="">None</option><option value="T1" ${p.team === "T1" ? "selected" : ""}>T1</option><option value="R1" ${p.team === "R1" ? "selected" : ""}>R1</option><option value="T2" ${p.team === "T2" ? "selected" : ""}>T2</option><option value="R2" ${p.team === "R2" ? "selected" : ""}>R2</option></select></td>
                <td><select class="canyon-zone" data-idx="${idx}">${zoneOptions}</select></td>
                <td><input type="number" class="canyon-clashpoints" data-idx="${idx}" value="${clashPoints}" style="width:100px;" disabled></td>
                <td><select class="canyon-availability" data-idx="${idx}"><option value="Available" ${p.availability === "Available" ? "selected" : ""}>Available</option><option value="To Confirme" ${p.availability === "To Confirme" ? "selected" : ""}>To Confirme</option><option value="Fixed" ${p.availability === "Fixed" ? "selected" : ""}>Fixed</option><option value="Reserve" ${p.availability === "Reserve" ? "selected" : ""}>Reserve</option><option value="No Participate" ${p.availability === "No Participate" ? "selected" : ""}>No Participate</option><option value="No Show" ${p.availability === "No Show" ? "selected" : ""}>No Show</option></select></td>
                <td><button class="saveCanyonModalBtn" data-idx="${idx}">Save</button></td>
            `;
            tbody.appendChild(row);
        });
        document.querySelectorAll('.saveCanyonModalBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const idx = parseInt(btn.dataset.idx);
                const teamSelect = document.querySelector(`.canyon-team[data-idx="${idx}"]`);
                const zoneSelect = document.querySelector(`.canyon-zone[data-idx="${idx}"]`);
                const availSelect = document.querySelector(`.canyon-availability[data-idx="${idx}"]`);
                if (teamSelect && zoneSelect && availSelect) {
                    players[idx].team = teamSelect.value;
                    players[idx].zone = zoneSelect.value;
                    players[idx].availability = availSelect.value;
                    await updateAllRankings();
                }
            });
        });
        const t1 = players.filter(p => p.team === "T1").length;
        const r1 = players.filter(p => p.team === "R1").length;
        const t2 = players.filter(p => p.team === "T2").length;
        const r2 = players.filter(p => p.team === "R2").length;
        document.getElementById("canyonModalStats").innerHTML = `<div class="stat-card">T1: ${t1}</div><div class="stat-card">R1: ${r1}</div><div class="stat-card">T2: ${t2}</div><div class="stat-card">R2: ${r2}</div>`;
    }

    document.getElementById("printCanyonPdfBtn")?.addEventListener("click", () => {
        const title = document.getElementById("reportTitle").value;
        const until = document.getElementById("untilDate").value;
        const printContent = document.getElementById("canyonModalTable").cloneNode(true);
        const w = window.open('', '_blank');
        w.document.write(`
            <html><head><title>Canyon Clash Roster</title>
            <style>body{font-family:Arial;margin:20px;} table{border-collapse:collapse;width:100%;} th,td{border:1px solid #000;padding:5px;} h2{text-align:center;}</style>
            </head><body><h2>${title} - Canyon Clash Roster</h2><p>Until: ${until}</p>${printContent.outerHTML}</body></html>
        `);
        w.document.close();
        w.print();
    });

    // Goals apply
    function applyVsThresholds() {
        const newWeek = parseFloat(document.getElementById("minVsWeek").value);
        const new4Week = parseFloat(document.getElementById("minVs4Week").value);
        if (!isNaN(newWeek)) vsWeekMin = newWeek;
        if (!isNaN(new4Week)) vs4WeekMin = new4Week;
        updateStats();
        renderPlayersTable();
    }
    document.getElementById("applyVsThresholdsBtn")?.addEventListener("click", applyVsThresholds);

    // Clear all checkboxes
    document.getElementById("clearChecksBtn")?.addEventListener("click", () => {
        document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = false);
        const selectAll = document.getElementById("selectAllCheckbox");
        if (selectAll) selectAll.checked = false;
    });

    // Modals init
    const canyonModal = document.getElementById("canyonModal");
    document.getElementById("openCanyonModalBtn")?.addEventListener("click", () => { renderCanyonModal(); canyonModal.style.display = "flex"; });
    document.getElementById("closeModalBtn")?.addEventListener("click", () => canyonModal.style.display = "none");
    document.getElementById("syncCanyonModalBtn")?.addEventListener("click", () => renderCanyonModal());
    window.addEventListener("click", (e) => { if (e.target === canyonModal) canyonModal.style.display = "none"; });
    window.addEventListener("click", (e) => { if (e.target === document.getElementById("filterModal")) document.getElementById("filterModal").style.display = "none"; });
    window.addEventListener("click", (e) => { if (e.target === document.getElementById("playerModal")) document.getElementById("playerModal").style.display = "none"; });
    window.addEventListener("click", (e) => { if (e.target === document.getElementById("ocrModal")) document.getElementById("ocrModal").style.display = "none"; });

    // Initialization
    async function initializeApp() {
        const loadedPlayers = await loadPlayersFromSheet();
        if (loadedPlayers && loadedPlayers.length) {
            players = loadedPlayers;
            players.forEach(p => {
                if (!p.availability) p.availability = "Available";
                if (!p.zone) p.zone = "A";
            });
        } else {
            players = [];
        }
        await updateAllRankings();
        if (players.length === 0) {
            document.getElementById("statsContainer").innerHTML = '<div class="stat-card">No players loaded. Please load Excel or add players manually.</div>';
        }
    }
    initializeApp();
</script>
